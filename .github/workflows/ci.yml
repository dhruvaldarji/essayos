name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selftest:
    name: Package self-test (lint + fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run EssayOS self-test (structural lint + fixture assertions)
        run: npm test
